# ══════════════════════════════════════════════════════════════════════════════
# The Great Trading Company — Docker Compose
#
# Start all 6 MCP trading posts with one command:
#   docker compose up              — start all
#   docker compose up salesforce   — start only Salesforce
#   docker compose up -d           — start in background
#   docker compose down            — stop all
#
# Prerequisites:
#   1. Docker Desktop installed (https://docker.com/products/docker-desktop)
#   2. Each app has a .env file with credentials (copy from .env.example)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Salesforce CRM (The Trade Ledger) ─────────────────────────────────────
  salesforce:
    build: ./sf-mcp-app
    ports:
      - "3000:3000"
    env_file:
      - ./sf-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3000),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ServiceNow ITSM (The Service Manifest) ───────────────────────────────
  servicenow:
    build: ./snow-mcp-app
    ports:
      - "3001:3001"
    env_file:
      - ./snow-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3001),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── SAP S/4HANA (The Cargo Manifest) ──────────────────────────────────────
  sap:
    build: ./sap-mcp-app
    ports:
      - "3002:3002"
    env_file:
      - ./sap-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3002),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── HubSpot Marketing (The Spice Bazaar) ──────────────────────────────────
  hubspot:
    build: ./hubspot-mcp-app
    ports:
      - "3003:3003"
    env_file:
      - ./hubspot-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3003),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Flight Tracker (The Sky Watch) ────────────────────────────────────────
  flight:
    build: ./flight-mcp-app
    ports:
      - "3004:3004"
    env_file:
      - ./flight-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3004),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── DocuSign eSignature (The Seal & Quill) ────────────────────────────────
  docusign:
    build: ./docusign-mcp-app
    ports:
      - "3005:3005"
    env_file:
      - ./docusign-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',3005),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ASGI Gateway — single port for all 6 LOBs ─────────────────────────────
  # Starts all 6 MCP servers in one process on port 8080.
  # Use instead of the 6 individual services above:
  #   docker compose --profile gateway up gateway
  # Tunnel: devtunnel port create gtc-tunnel -p 8080
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./sf-mcp-app/.env
      - ./snow-mcp-app/.env
      - ./sap-mcp-app/.env
      - ./hubspot-mcp-app/.env
      - ./flight-mcp-app/.env
      - ./docusign-mcp-app/.env
    environment:
      GATEWAY_PORT: "8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('localhost',8080),2); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - gateway
