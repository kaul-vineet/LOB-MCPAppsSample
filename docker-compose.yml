# ══════════════════════════════════════════════════════════════════════════════
# The Great Trading Company — Docker Compose
#
# Start all 4 MCP trading posts with one command:
#   docker compose up              — start all
#   docker compose up salesforce   — start only Salesforce
#   docker compose up -d           — start in background
#   docker compose down            — stop all
#
# Prerequisites:
#   1. Docker Desktop installed (https://docker.com/products/docker-desktop)
#   2. Each app has a .env file with credentials (copy from .env.example)
# ══════════════════════════════════════════════════════════════════════════════

services:
  # ── Salesforce CRM (The Trade Ledger) ─────────────────────────────────────
  salesforce:
    build: ./sf-mcp-app
    ports:
      - "3000:3000"
    env_file:
      - ./sf-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ServiceNow ITSM (The Service Manifest) ───────────────────────────────
  servicenow:
    build: ./snow-mcp-app
    ports:
      - "3001:3001"
    env_file:
      - ./snow-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── SAP S/4HANA (The Cargo Manifest) ──────────────────────────────────────
  sap:
    build: ./sap-mcp-app
    ports:
      - "3002:3002"
    env_file:
      - ./sap-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── HubSpot Marketing (The Spice Bazaar) ──────────────────────────────────
  hubspot:
    build: ./hubspot-mcp-app
    ports:
      - "3003:3003"
    env_file:
      - ./hubspot-mcp-app/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3003/mcp')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
