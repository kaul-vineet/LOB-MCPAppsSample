<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MCP Apps Test Harness</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    overflow: hidden;
    background: #f5f5f5;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 30%;
    min-width: 280px;
    max-width: 420px;
    background: #1e1e1e;
    color: #ccc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar h1 {
    font-size: 15px;
    font-weight: 600;
    padding: 14px 16px 10px;
    color: #e0e0e0;
    border-bottom: 1px solid #333;
    letter-spacing: 0.3px;
  }

  .controls {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    border-bottom: 1px solid #333;
    flex-shrink: 0;
  }

  .control-row {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .control-row.inline {
    flex-direction: row;
    align-items: center;
    gap: 8px;
  }

  label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    font-weight: 500;
  }

  select, button {
    font-family: inherit;
    font-size: 13px;
    border: 1px solid #444;
    border-radius: 4px;
    background: #2a2a2a;
    color: #ddd;
    padding: 6px 10px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select:hover, button:hover { border-color: #666; }
  select:focus, button:focus { border-color: #4da6ff; }

  button.primary {
    background: #0078d4;
    border-color: #0078d4;
    color: #fff;
    font-weight: 600;
  }
  button.primary:hover { background: #106ebe; }

  button.secondary {
    background: #333;
    border-color: #555;
  }
  button.secondary:hover { background: #444; }

  .btn-row {
    display: flex;
    gap: 8px;
  }
  .btn-row button { flex: 1; }

  input[type="checkbox"] { accent-color: #e04040; }

  input[type="range"] {
    width: 100%;
    accent-color: #4da6ff;
  }

  .range-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: #888;
  }

  .info-box {
    font-size: 12px;
    padding: 6px 10px;
    background: #252525;
    border: 1px solid #333;
    border-radius: 4px;
    color: #aaa;
    font-family: 'Cascadia Code', 'Fira Code', monospace;
  }

  /* ── Event log ── */
  .log-header {
    padding: 8px 16px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: #888;
    font-weight: 500;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .log-header button {
    font-size: 11px;
    padding: 2px 8px;
    background: #333;
    border-color: #555;
  }

  #eventLog {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.6;
  }

  .log-entry {
    padding: 2px 0;
    word-break: break-all;
  }
  .log-entry .ts {
    color: #666;
    margin-right: 6px;
  }
  .log-out       { color: #569cd6; }   /* blue — outgoing */
  .log-in        { color: #6a9955; }   /* green — incoming */
  .log-err       { color: #f44747; }   /* red — errors */

  /* ── Main area ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fff;
  }

  .main-toolbar {
    padding: 8px 16px;
    background: #fafafa;
    border-bottom: 1px solid #e0e0e0;
    font-size: 12px;
    color: #666;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .main-toolbar .widget-url {
    flex: 1;
    font-family: monospace;
    font-size: 11px;
    color: #999;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #widgetFrame {
    flex: 1;
    border: none;
    width: 100%;
  }
</style>
</head>
<body>

<!-- ═══════════════════════ SIDEBAR ═══════════════════════ -->
<div class="sidebar">
  <h1>🔌 MCP Apps Test Harness</h1>

  <div class="controls">
    <!-- Widget selector -->
    <div class="control-row">
      <label for="widgetSelect">Widget</label>
      <select id="widgetSelect">
        <option value="salesforce" data-src="../sf-mcp-app/sf_crm_mcp/web/widget.html">Salesforce CRM (v1)</option>

        <option value="servicenow" data-src="../snow-mcp-app/servicenow_mcp/web/widget.html">ServiceNow ITSM</option>
        <option value="servicenow" data-src="../snow-mcp-app/servicenow_mcp/web/widget-v1.html">ServiceNow ITSM (v1)</option>
        <option value="sap"        data-src="../sap-mcp-app/sap_s4hana_mcp/web/widget.html">SAP S/4HANA (v1)</option>

        <option value="hubspot"    data-src="../hubspot-mcp-app/hubspot_mcp/web/widget-v2.html">HubSpot Marketing (v2 Fluent)</option>
      </select>
    </div>

    <!-- Data type selector -->
    <div class="control-row">
      <label for="dataTypeSelect">Data Type</label>
      <select id="dataTypeSelect"></select>
    </div>

    <!-- Action buttons -->
    <div class="btn-row">
      <button class="primary" id="btnSendData">▶ Send Data</button>
      <button class="secondary" id="btnTheme">🌗 Theme</button>
    </div>

    <div class="btn-row">
      <button class="secondary" id="btnReload">↻ Reload</button>
    </div>

    <!-- Error mode -->
    <div class="control-row inline">
      <input type="checkbox" id="chkError"/>
      <label for="chkError" style="text-transform:none;color:#e04040;cursor:pointer;">
        Error mode — callTool returns errors
      </label>
    </div>

    <!-- Latency slider -->
    <div class="control-row">
      <label>Latency</label>
      <input type="range" id="latencySlider" min="0" max="5000" step="100" value="600"/>
      <div class="range-label">
        <span>0 ms</span>
        <span id="latencyValue">600 ms</span>
        <span>5000 ms</span>
      </div>
    </div>

    <!-- Height display -->
    <div class="control-row">
      <label>Reported Height</label>
      <div class="info-box" id="heightDisplay">— waiting —</div>
    </div>
  </div>

  <!-- Event log -->
  <div class="log-header">
    <span>Event Log</span>
    <button id="btnClearLog">Clear</button>
  </div>
  <div id="eventLog"></div>
</div>

// DOM refs
// ─────────────────────────────────────────────────────────────────────────────
var elWidgetSelect   = document.getElementById('widgetSelect');
var elDataType       = document.getElementById('dataTypeSelect');
var elBtnSend        = document.getElementById('btnSendData');
var elBtnTheme       = document.getElementById('btnTheme');
var elBtnReload      = document.getElementById('btnReload');
var elBtnClearLog    = document.getElementById('btnClearLog');
var elChkError       = document.getElementById('chkError');
var elLatency        = document.getElementById('latencySlider');
var elLatencyVal     = document.getElementById('latencyValue');
var elHeightDisplay  = document.getElementById('heightDisplay');
var elEventLog       = document.getElementById('eventLog');
var elWidgetUrl      = document.getElementById('widgetUrl');
var elFrame          = document.getElementById('widgetFrame');

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
var currentTheme = 'light';
var mockData     = null;        // loaded JSON for the active widget
var liveData     = {};          // mutable clone of dataTypes for callTool mutations

// ─────────────────────────────────────────────────────────────────────────────
// Logging
// ─────────────────────────────────────────────────────────────────────────────
function log(direction, method, data) {
  var now  = new Date();
  var ts   = now.toLocaleTimeString('en-GB', { hour12: false }) + '.' +
             String(now.getMilliseconds()).padStart(3, '0');

  var cls  = direction === 'out' ? 'log-out' : direction === 'err' ? 'log-err' : 'log-in';
  var arrow = direction === 'out' ? '→' : direction === 'err' ? '✖' : '←';

  var detail = '';
  if (data !== undefined) {
    try { detail = JSON.stringify(data); } catch (_) { detail = String(data); }
    if (detail.length > 200) detail = detail.substring(0, 200) + '…';
  }

  var div = document.createElement('div');
  div.className = 'log-entry ' + cls;
  div.innerHTML = '<span class="ts">' + ts + '</span>' + arrow + ' <b>' + method + '</b> ' + detail;
  elEventLog.appendChild(div);
  elEventLog.scrollTop = elEventLog.scrollHeight;
}

elBtnClearLog.addEventListener('click', function () { elEventLog.innerHTML = ''; });

// ─────────────────────────────────────────────────────────────────────────────
// Latency slider
// ─────────────────────────────────────────────────────────────────────────────
elLatency.addEventListener('input', function () {
  elLatencyVal.textContent = this.value + ' ms';
});

// ─────────────────────────────────────────────────────────────────────────────
// Data-type dropdown — rebuild when widget changes
// ─────────────────────────────────────────────────────────────────────────────
function rebuildDataTypes() {
  var key  = elWidgetSelect.value;
  var types = WIDGET_CONFIG[key].dataTypes;
  elDataType.innerHTML = '';
  types.forEach(function (t) {
    var opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t.replace(/_/g, ' ');
    elDataType.appendChild(opt);
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// Load mock data & init live data
// ─────────────────────────────────────────────────────────────────────────────
function loadMockData(key) {
  var json = EMBEDDED_MOCKS[key];
  if (!json) {
    log('err', 'mock-load-failed', 'No embedded mock for: ' + key);
    return Promise.resolve();
  }
  mockData = json;
  liveData = JSON.parse(JSON.stringify(json.dataTypes));
  log('in', 'mock-loaded', { widget: key, types: Object.keys(liveData) });
  return Promise.resolve();
}

// ─────────────────────────────────────────────────────────────────────────────
// Load widget into iframe
// ─────────────────────────────────────────────────────────────────────────────
function loadWidget() {
  var opt = elWidgetSelect.selectedOptions[0];
  var src = opt.getAttribute('data-src');
  elWidgetUrl.textContent = src;
  elFrame.src = src;
  log('out', 'iframe-load', src);
  initialDataSent = false;

  // After iframe loads, send SANDBOX_PROXY_READY to trigger MCP Apps handshake
  elFrame.onload = function () {
    setTimeout(function () {
      sendToWidget({ type: 'SANDBOX_PROXY_READY' });
      log('out', 'SANDBOX_PROXY_READY', null);
    }, 200);
  };
}

elWidgetSelect.addEventListener('change', function () {
  rebuildDataTypes();
  loadMockData(this.value).then(loadWidget);
});

elBtnReload.addEventListener('click', function () {
  loadMockData(elWidgetSelect.value).then(loadWidget);
});

// ─────────────────────────────────────────────────────────────────────────────
// postMessage helpers
// ─────────────────────────────────────────────────────────────────────────────
function sendToWidget(msg) {
  elFrame.contentWindow.postMessage(msg, '*');
}

// ─────────────────────────────────────────────────────────────────────────────
// MCP handshake handling
// ─────────────────────────────────────────────────────────────────────────────
function handleInitialize(msg) {
  log('in', 'ui/initialize', msg.params);
  // Respond with host context
  var resp = {
    jsonrpc: '2.0',
    id: msg.id,
    result: {
      hostInfo: { name: 'mcp-test-harness', version: '1.0' },
      hostCapabilities: {},
      theme: currentTheme
    }
  };
  sendToWidget(resp);
  log('out', 'ui/initialize (response)', resp.result);
}

var initialDataSent = false;

function handleInitialized(msg) {
  log('in', 'ui/notifications/initialized', null);
  if (!initialDataSent) {
    initialDataSent = true;
    sendToolResult();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Send ui/notifications/tool-result
// ─────────────────────────────────────────────────────────────────────────────
function sendToolResult() {
  var dt  = elDataType.value;
  var data = liveData[dt];
  if (!data) {
    log('err', 'send-data', 'No mock data for type: ' + dt);
    return;
  }
  var msg = {
    jsonrpc: '2.0',
    method: 'ui/notifications/tool-result',
    params: {
      structuredContent: data,
      content: [{ type: 'text', text: JSON.stringify(data) }],
      isError: false
    }
  };
  sendToWidget(msg);
  log('out', 'ui/notifications/tool-result', { type: dt, count: (data.items || data.incidents || data.requests || []).length });
}

elBtnSend.addEventListener('click', sendToolResult);

// ─────────────────────────────────────────────────────────────────────────────
// Theme toggle
// ─────────────────────────────────────────────────────────────────────────────
elBtnTheme.addEventListener('click', function () {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  var msg = {
    jsonrpc: '2.0',
    method: 'ui/notifications/theme-change',
    params: { theme: currentTheme }
  };
  sendToWidget(msg);
  log('out', 'ui/notifications/theme-change', { theme: currentTheme });
});

// ─────────────────────────────────────────────────────────────────────────────
// callTool — resolve mock responses with configured latency
// ─────────────────────────────────────────────────────────────────────────────
function resolveCallTool(requestId, toolName, toolArgs) {
  var latency = parseInt(elLatency.value, 10) || 0;

  setTimeout(function () {
    // Error mode
    if (elChkError.checked) {
      var errMsg = {
        jsonrpc: '2.0',
        id: requestId,
        error: { code: -32603, message: 'Simulated error' }
      };
      sendToWidget(errMsg);
      log('err', 'tools/call (error response)', { id: requestId, tool: toolName });
      return;
    }

    // Look up response template
    var template = mockData && mockData.callToolResponses && mockData.callToolResponses[toolName];
    var responseData;

    if (template) {
      responseData = buildCallToolResponse(template, toolName, toolArgs);
    } else {
      // Fallback: return current live data for the first matching type
      var matchedType = guessDataType(toolName);
      responseData = matchedType ? JSON.parse(JSON.stringify(liveData[matchedType])) : { message: 'No mock configured for tool: ' + toolName };
    }

    var resp = {
      jsonrpc: '2.0',
      id: requestId,
      result: {
        content: [{ type: 'text', text: JSON.stringify(responseData) }],
        structuredContent: responseData
      }
    };
    sendToWidget(resp);
    log('out', 'tools/call (response)', { id: requestId, tool: toolName, type: responseData.type });
  }, latency);
}

// Build a response from a template, handling USE_CURRENT* placeholders
function buildCallToolResponse(template, toolName, toolArgs) {
  var result = JSON.parse(JSON.stringify(template));
  var items  = result.items;

  if (typeof items !== 'string') {
    // Static response — return as-is
    return result;
  }

  // Figure out which liveData type to use
  var targetType = result.type || guessDataType(toolName);
  var currentItems = (liveData[targetType] && liveData[targetType].items)
                      ? JSON.parse(JSON.stringify(liveData[targetType].items))
                      : [];

  if (items === 'USE_CURRENT') {
    result.items = currentItems;
  } else if (items === 'USE_CURRENT_PLUS_NEW') {
    var newItem = Object.assign({}, toolArgs || {});
    if (result._createdId) {
      // Find the ID field from existing items
      var idField = detectIdField(currentItems);
      if (idField) newItem[idField] = result._createdId;
      delete result._createdId;
    }
    currentItems.push(newItem);
    result.items = currentItems;
    result.total = currentItems.length;
    // Update liveData so subsequent calls reflect the mutation
    if (liveData[targetType]) {
      liveData[targetType].items = JSON.parse(JSON.stringify(currentItems));
      liveData[targetType].total = currentItems.length;
    }
  } else if (items === 'USE_CURRENT_WITH_UPDATE') {
    // Merge toolArgs into the first matching item (by id field)
    var idField = detectIdField(currentItems);
    var updated = false;
    if (idField && toolArgs && toolArgs[idField]) {
      for (var i = 0; i < currentItems.length; i++) {
        if (String(currentItems[i][idField]) === String(toolArgs[idField])) {
          Object.assign(currentItems[i], toolArgs);
          updated = true;
          break;
        }
      }
    }
    if (!updated && toolArgs) {
      // Just merge into the first item as a fallback
      if (currentItems.length > 0) Object.assign(currentItems[0], toolArgs);
    }
    result.items = currentItems;
    if (liveData[targetType]) {
      liveData[targetType].items = JSON.parse(JSON.stringify(currentItems));
    }
  } else if (items === 'USE_CURRENT_MINUS_REMOVED') {
    // Remove item matching toolArgs id
    var idField = detectIdField(currentItems);
    if (idField && toolArgs && toolArgs[idField]) {
      currentItems = currentItems.filter(function (it) {
        return String(it[idField]) !== String(toolArgs[idField]);
      });
    }
    result.items = currentItems;
    result.total = currentItems.length;
    if (liveData[targetType]) {
      liveData[targetType].items = JSON.parse(JSON.stringify(currentItems));
      liveData[targetType].total = currentItems.length;
    }
  }

  return result;
}

// Detect the primary ID field from an array of objects
function detectIdField(items) {
  if (!items || items.length === 0) return null;
  var first = items[0];
  var candidates = ['id', 'sys_id', 'number', 'purchase_order', 'product'];
  for (var i = 0; i < candidates.length; i++) {
    if (first.hasOwnProperty(candidates[i])) return candidates[i];
  }
  return Object.keys(first)[0];
}

// Guess which dataType a tool name relates to
function guessDataType(toolName) {
  var name = toolName.toLowerCase();
  var types = Object.keys(liveData);
  // Direct suffix match: "create_lead" → "leads" (singular → plural)
  for (var i = 0; i < types.length; i++) {
    if (name.indexOf(types[i]) !== -1) return types[i];
    // Try singular form
    var singular = types[i].replace(/s$/, '').replace(/ies$/, 'y');
    if (name.indexOf(singular) !== -1) return types[i];
  }
  // For compound names like "create_purchase_order" → "purchase_orders"
  for (var i = 0; i < types.length; i++) {
    var words = types[i].replace(/_/g, ' ');
    var singular = words.replace(/s$/, '');
    if (name.replace(/_/g, ' ').indexOf(singular) !== -1) return types[i];
  }
  return types[0] || null;
}

// ─────────────────────────────────────────────────────────────────────────────
// Incoming message handler
// ─────────────────────────────────────────────────────────────────────────────
window.addEventListener('message', function (event) {
  var msg = event.data;
  if (!msg || typeof msg !== 'object') return;

  // ── ui/initialize ──
  if (msg.jsonrpc === '2.0' && msg.method === 'ui/initialize') {
    handleInitialize(msg);
    return;
  }

  // ── ui/notifications/initialized ──
  if (msg.jsonrpc === '2.0' && msg.method === 'ui/notifications/initialized') {
    handleInitialized(msg);
    return;
  }

  // ── tools/call ──
  if (msg.jsonrpc === '2.0' && msg.method === 'tools/call') {
    var toolName = msg.params && msg.params.name;
    var toolArgs = msg.params && msg.params.arguments;
    log('in', 'tools/call', { id: msg.id, tool: toolName, args: toolArgs });
    resolveCallTool(msg.id, toolName, toolArgs);
    return;
  }

  // ── ui/notifyIntrinsicHeight ──
  if (msg.jsonrpc === '2.0' && msg.method === 'ui/notifyIntrinsicHeight') {
    var h = msg.params && msg.params.height;
    elHeightDisplay.textContent = h != null ? h + 'px' : '—';
    log('in', 'ui/notifyIntrinsicHeight', { height: h });
    return;
  }

  // ── ui/size-changed ──
  if (msg.jsonrpc === '2.0' && msg.method === 'ui/size-changed') {
    var size = msg.params || {};
    elHeightDisplay.textContent = (size.width || '?') + ' × ' + (size.height || '?') + ' px';
    log('in', 'ui/size-changed', size);
    return;
  }

  // ── Catch-all for unknown messages ──
  if (msg.jsonrpc === '2.0') {
    log('in', msg.method || 'unknown', msg.params || msg);
  }
}, false);

// ─────────────────────────────────────────────────────────────────────────────
// Bootstrap
// ─────────────────────────────────────────────────────────────────────────────
rebuildDataTypes();
loadMockData(elWidgetSelect.value).then(loadWidget);
</script>
